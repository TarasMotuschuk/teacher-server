name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  code-quality:
    name: Code quality
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore solution
        run: dotnet restore TeacherServer.sln --nologo

      - name: Verify formatting
        run: dotnet format TeacherServer.sln --verify-no-changes --no-restore --severity error

      - name: Build with analyzers
        run: dotnet build TeacherServer.sln -c Release --no-restore --nologo -p:ContinuousIntegrationBuild=true


  # ─────────────────────────────────────────────
  # Windows: build all Windows projects + MSI
  # ─────────────────────────────────────────────
  build-windows:
    name: Windows — build & MSI
    runs-on: windows-latest
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build Teacher.Common
        run: dotnet build Teacher.Common/Teacher.Common.csproj -c Release --nologo

      - name: Build TeacherClient (WinForms)
        run: dotnet build TeacherClient/TeacherClient.csproj -c Release --nologo

      - name: Build TeacherClient.Avalonia
        run: dotnet build TeacherClient.Avalonia/TeacherClient.Avalonia.csproj -c Release --nologo

      - name: Build StudentAgent.Service
        run: dotnet build StudentAgent.Service/StudentAgent.Service.csproj -c Release --nologo

      - name: Build StudentAgent.UIHost
        run: dotnet build StudentAgent.UIHost/StudentAgent.UIHost.csproj -c Release --nologo

      - name: Build StudentAgent.VncHost
        run: dotnet build StudentAgent.VncHost/StudentAgent.VncHost.csproj -c Release --nologo

      - name: Build ClassCommander.Setup.msi
        run: powershell -ExecutionPolicy Bypass -File TeacherServer.Setup\Build-Msi.ps1 -Configuration Release

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: TeacherServer-MSI
          path: TeacherServer.Setup/dist/ClassCommander.Setup.msi
          if-no-files-found: error

  # ─────────────────────────────────────────────
  # macOS: build Avalonia client + .pkg installer
  # ─────────────────────────────────────────────
  build-macos:
    name: macOS — Avalonia .pkg
    runs-on: macos-14   # ARM64 (M1) — matches osx-arm64 publish target
    needs: code-quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Read version from Directory.Build.props
        id: version
        run: |
          VERSION=$(grep -oE '<Version>[0-9]+\.[0-9]+\.[0-9]+</Version>' Directory.Build.props \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Import Apple Development signing certificate
        if: ${{ secrets.MACOS_APP_CERT_BASE64 != '' && secrets.MACOS_APP_CERT_PASSWORD != '' }}
        shell: bash
        env:
          MACOS_APP_CERT_BASE64: ${{ secrets.MACOS_APP_CERT_BASE64 }}
          MACOS_APP_CERT_PASSWORD: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/classcommander-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/classcommander-signing-cert.p12"

          echo "$MACOS_APP_CERT_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_APP_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build ClassCommander.Setup.pkg
        env:
          CONFIGURATION: Release
          RUNTIME: osx-arm64
          VERSION: ${{ steps.version.outputs.value }}
          GITHUB_TOKEN: ${{ github.token }}
          SIGNING_MODE: auto
        run: bash TeacherClient.Avalonia.Setup/Build-MacInstaller.sh

      - name: Upload .pkg
        uses: actions/upload-artifact@v4
        with:
          name: ClassCommander-macOS
          path: TeacherClient.Avalonia.Setup/dist/ClassCommander.Setup.pkg
          if-no-files-found: error
